name: CI

on:
  push:
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci:
    name: Build & Test
    runs-on: ubuntu-latest
    env:
      # Vercel Remote Cache (optional): add repo secret TURBO_TOKEN and variable TURBO_TEAM
      # (team slug). See https://turbo.build/repo/docs/core-concepts/remote-caching
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ vars.TURBO_TEAM }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Collect Changed Files
        if: github.event_name == 'pull_request'
        shell: bash
        run: |
          set -euo pipefail
          git fetch --no-tags --prune --depth=1 origin "${{ github.base_ref }}"
          git diff --name-only "origin/${{ github.base_ref }}...${{ github.sha }}" > changed-files.txt

      - name: Enforce Changeset For Release-Impacting Package Changes
        if: github.event_name == 'pull_request'
        shell: bash
        run: |
          node <<'NODE'
          const fs = require('node:fs');

          const changed = fs
            .readFileSync('changed-files.txt', 'utf8')
            .split('\n')
            .map((line) => line.trim())
            .filter(Boolean);

          const isChangeset = (file) =>
            file.startsWith('.changeset/') && file.endsWith('.md') && file !== '.changeset/README.md';

          const isReleaseImpactingPackageChange = (file) => {
            if (!file.startsWith('packages/')) return false;
            if (file.startsWith('packages/dev/')) return false;
            if (/(^|\/)__tests__(\/|$)/.test(file)) return false;
            if (/\.(test|spec)\.[cm]?[jt]sx?$/.test(file)) return false;
            if (file.endsWith('.md') || file.endsWith('.mdx')) return false;
            return true;
          };

          const changesetTouched = changed.some(isChangeset);
          const impactingPackageChanges = changed.filter(isReleaseImpactingPackageChange);

          if (impactingPackageChanges.length > 0 && !changesetTouched) {
            console.error('Release-impacting package changes were detected without a changeset file.');
            console.error('Add one with: pnpm changeset');
            console.error('Changed files requiring a changeset:');
            for (const file of impactingPackageChanges) {
              console.error(` - ${file}`);
            }
            process.exit(1);
          }

          console.log('Changeset guard passed.');
          if (impactingPackageChanges.length === 0) {
            console.log('No release-impacting package changes found.');
          }
          NODE

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Turborepo local artifacts
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ hashFiles('pnpm-lock.yaml') }}-${{ github.ref_name }}
          restore-keys: |
            ${{ runner.os }}-turbo-${{ hashFiles('pnpm-lock.yaml') }}-
            ${{ runner.os }}-turbo-

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

      - name: Type Check
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint
