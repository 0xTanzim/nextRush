name: Release

on:
  push:
    branches:
      - main
    paths:
      - ".changeset/**"
      - "packages/**"
      - "pnpm-lock.yaml"
      - "package.json"
      - "CHANGELOG.md"
      - ".github/workflows/release.yml"
  workflow_dispatch:

concurrency: ${{ github.workflow }}-${{ github.ref }}

# These permissions are required for changesets/action to push the
# changeset-release/* branch and open/update a version PR.
# In addition, the repository must have "Allow GitHub Actions to create and
# approve pull requests" enabled under:
#   Settings → Actions → General → Workflow permissions
permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup toolchain
        uses: ./.github/actions/setup-toolchain
        with:
          registry-url: https://registry.npmjs.org

      - uses: changesets/action@v1
        id: changesets
        with:
          publish: pnpm release
          version: pnpm run version
          title: "chore(release): version packages"
          commit: "chore(release): version packages"
          createGithubReleases: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Release notification
        if: steps.changesets.outputs.published == 'true'
        env:
          PUBLISHED_PACKAGES: ${{ steps.changesets.outputs.publishedPackages }}
        run: |
          echo "Packages published."
          node -e "const j = JSON.parse(process.env.PUBLISHED_PACKAGES || '[]'); console.log(JSON.stringify(j, null, 2));"
